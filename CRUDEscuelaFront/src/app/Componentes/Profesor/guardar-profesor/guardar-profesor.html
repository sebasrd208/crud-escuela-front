<div class="container py-5">
    <div class="card shadow-lg border-0 rounded-3">
        <div class="card-header bg-light text-center py-4">
            <h2 class="fw-bold text-secondary m-0"> REGISTRO DE MAESTROS</h2>
        </div>

        <div class="card-body p-4">
            <form>
                <div class="mb-3">
                    <label for="idProfesor" class="form-label fw-semibold"> ID: </label>
                    <input type="number" class="form-control form-control-lg shadow-sm" name="id"
                        [(ngModel)]="profe.idProfesor" placeholder="Ingresa el id del profesor">
                </div>

                <div class="mb-3">
                    <label for="nombre" class="form-label fw-semibold"> NOMBRE: </label>
                    <input type="text" class="form-control form-control-lg shadow-sm" name="nombre"
                        [(ngModel)]="profe.nombre" placeholder="Ingresa el nombre del maestro">
                </div>

                <div class="mb-3">
                    <label for="edad" class="form-label fw-semibold"> EDAD: </label>
                    <input type="number" class="form-control form-control-lg shadow-sm" name="edad"
                        [(ngModel)]="profe.edad" placeholder="Ingresa la edad del maestro">
                </div>

                <div class="mb-3">
                    <label for="especialidad" class="form-label fw-semibold"> ESPECIALIDAD: </label>
                    <input type="text" class="form-control form-control-lg shadow-sm" name="especialidad"
                        [(ngModel)]="profe.especialidad" placeholder="Ingresa la especialidad del maestro">
                </div>

                <div class="mb-3">
                    <label for="id" class="form-label fw-semibold"> ID DE LA ESCUELA: </label>
                    <input type="text" class="form-control form-control-lg shadow-sm" name="id"
                        [(ngModel)]="escuela.id" placeholder="Ingresa el id de la escuela">
                </div>

                <div class="d-flex justify-content-center gap-3">
                    <button class="btn btn-lg btn-outline-success shadow-sm px-4" (click)="guardar()">
                        <i class="bi bi-check-circle me-2"></i> GUARDAR
                    </button>

                    <button class="btn btn-lg btn-outline-secondary shadow-sm px-4" (click)="cancelar()">
                        <i class="bi bi-x-circle me-2"></i> CANCELAR
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
