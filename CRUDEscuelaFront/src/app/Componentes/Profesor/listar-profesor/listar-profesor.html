
<div class="container py-5">
    <div class="card shadow-lg border-0 rounded-3">
        <div class="card-header text-center bg-light py-4">
            <h2 class="fw-bold text-secondary m-0">LISTA DE ESCUELAS</h2>

            <!-- Buscadores -->
            <div class="d-flex justify-content-center my-4 gap-3 flex-wrap">
                <div class="input-group input-group-lg w-50 shadow-sm">
                    <span class="input-group-text bg-warning text-white">
                        <i class="bi bi-tags"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Ingresa la especialidad del maestro"
                        [(ngModel)]="filtro.nivel" (ngModelChange)="filtrarProfesores()">
                </div>
            </div>
        </div>    
        <div class="card-body p-4">
            <div class="d-flex justify-content-align">
                <button class="btn btn-lg btn-outline-success shadow-sm px-4" (click)="guardar()">
                    <i class="bi bi-plus-circle me-2"></i> GUARDAR
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-info text-center">
                        <tr>
                            <th>ID</th>
                            <th>NOMBRE</th>
                            <th>EDAD</th>
                            <th>ESPECIALIDAD</th>
                            <th>ESCUELA</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody>
                        @for (profe of profesoresFiltrados; track profe.idProfesor) {
                        <tr class="text-center">
                            <td>{{ profe.idProfesor }}</td>
                            <td>{{ profe.nombre }}</td>
                            <td>{{ profe.edad }}</td>
                            <td>{{ profe.especialidad }}</td>
                            <td>{{ profe.escuela.nombre }}</td>
                            <td>
                                <div class="d-flex justify-content-center gap-3">
                                    <button class="btn btn-lg btn-outline-warning shadow-sm" (click)="editar(profe)">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-lg btn-outline-danger shadow-sm" (click)="eliminar(profe)">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        } @empty {
                        <tr>
                            <td colspan="7" class="text-center text-muted py-4">No existen profesores registrados.</td>
                        </tr>
                        }
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
