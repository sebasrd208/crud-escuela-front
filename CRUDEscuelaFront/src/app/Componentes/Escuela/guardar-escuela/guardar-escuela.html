<div class="container py-5">
    <div class="card shadow-lg border-0 rounded-3">
        <div class="card-header bg-light text-center py-4">
            <h2 class="fw-bold text-secondary m-0"> REGISTRO DE ESCUELAS</h2>
        </div>

        <div class="card-body p-4">
            <form>
                <div class="mb-3">
                    <label for="id" class="form-label fw-semibold"> ID: </label>
                    <input type="number" class="form-control form-control-lg shadow-sm" name="id"
                        [(ngModel)]="esc.id" placeholder="Ingresa el id de la escuela">
                </div>

                <div class="mb-3">
                    <label for="nombre" class="form-label fw-semibold"> NOMBRE: </label>
                    <input type="text" class="form-control form-control-lg shadow-sm" name="nombre"
                        [(ngModel)]="esc.nombre" placeholder="Ingresa el nombre de la escuela">
                </div>

                <div class="mb-3">
                    <label for="clave" class="form-label fw-semibold"> CLAVE: </label>
                    <input type="text" class="form-control form-control-lg shadow-sm" name="clave"
                        [(ngModel)]="esc.clave" placeholder="Ingresa la clave de la escuela">
                </div>

                <div class="mb-3">
                    <label for="nivel" class="form-label fw-semibold"> NIVEL: </label>
                    <input type="text" class="form-control form-control-lg shadow-sm" name="nivel"
                        [(ngModel)]="esc.nivel" placeholder="Ingresa el nivel de la escuela">
                </div>

                <div class="d-flex justify-content-center gap-3">
                    <button class="btn btn-lg btn-outline-success shadow-sm px-4" (click)="guardar()">
                        <i class="bi bi-check-circle me-2"></i> GUARDAR
                    </button>

                    <button class="btn btn-lg btn-outline-secondary shadow-sm px-4" (click)="cancelar()">
                        <i class="bi bi-x-circle me-2"></i> CANCELAR
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
